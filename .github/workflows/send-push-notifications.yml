name: Send Queued Push Notifications

# Backup only: Vercel cron GET /api/cron/send-event-push-queue every minute; POST /api/notifications/send-queued mirrors it (event + track queues).
# Credentials must match Vercel Production env: CRON_SECRET and/or SUPABASE_SERVICE_ROLE_KEY.
# This job uses GitHub Environment "Production". If both a secret AND a variable named CRON_SECRET exist,
# both are tried — a stale environment secret often causes 401 while the variable matches Vercel.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Send queued notifications
        env:
          CRON_FROM_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_FROM_VAR: ${{ vars.CRON_SECRET }}
          SRK_FROM_SECRET: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SRK_FROM_VAR: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }

          post_with_token() {
            local label="$1"
            local token="$2"
            if [ -z "${token}" ]; then
              return 2
            fi
            echo "Attempting auth with: ${label} (length ${#token})"
            HTTP_CODE=$(curl -sS -o /tmp/send-queued-body.txt -w "%{http_code}" -X POST \
              "https://www.soundbridge.live/api/notifications/send-queued" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${token}" \
              --connect-timeout 30 \
              --max-time 270)
            cat /tmp/send-queued-body.txt
            echo ""
            echo "HTTP ${HTTP_CODE}"
            [ "${HTTP_CODE}" = "200" ] || [ "${HTTP_CODE}" = "201" ]
          }

          # Collect unique non-empty tokens (secret vs variable often diverge on GitHub Environments).
          declare -a LABELS=()
          declare -a TOKENS=()
          add_token() {
            local label="$1"
            local token="$(trim "$2")"
            [ -z "${token}" ] && return 0
            for existing in "${TOKENS[@]:-}"; do
              [ "${existing}" = "${token}" ] && return 0
            done
            LABELS+=("${label}")
            TOKENS+=("${token}")
          }

          add_token "CRON_SECRET (environment secret)" "${CRON_FROM_SECRET}"
          add_token "CRON_SECRET (environment variable)" "${CRON_FROM_VAR}"
          add_token "SUPABASE_SERVICE_ROLE_KEY (environment secret)" "${SRK_FROM_SECRET}"
          add_token "SUPABASE_SERVICE_ROLE_KEY (environment variable)" "${SRK_FROM_VAR}"

          if [ "${#TOKENS[@]}" -eq 0 ]; then
            echo "Missing credentials: add CRON_SECRET and/or SUPABASE_SERVICE_ROLE_KEY to"
            echo "  • GitHub → Settings → Environments → Production → Secrets or Variables"
            echo "  • Vercel → Project → Settings → Environment Variables → Production"
            exit 1
          fi

          for i in "${!TOKENS[@]}"; do
            if post_with_token "${LABELS[$i]}" "${TOKENS[$i]}"; then
              echo "Success with ${LABELS[$i]}"
              exit 0
            fi
          done

          echo "All auth attempts failed. Delete or update stale GitHub Production secrets so they match Vercel."
          exit 22

      - name: Log result
        if: always()
        run: echo "Notification job completed at $(date)"
