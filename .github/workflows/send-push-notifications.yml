name: Send Queued Push Notifications

# Backup only: Vercel calls /api/cron/send-event-push-queue every minute (event_notifications).
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send queued notifications
        env:
          # Must match apps/web send-queued route: CRON_SECRET || SUPABASE_SERVICE_ROLE_KEY
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${CRON_SECRET}" ]; then
            TOKEN="${CRON_SECRET}"
          else
            TOKEN="${SUPABASE_SERVICE_ROLE_KEY}"
          fi
          if [ -z "${TOKEN}" ]; then
            echo "Missing GitHub Actions secret: set CRON_SECRET (same as Vercel) and/or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          curl -X POST "https://www.soundbridge.live/api/notifications/send-queued" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            --fail-with-body
        
      - name: Log result
        if: always()
        run: echo "Notification job completed at $(date)"

