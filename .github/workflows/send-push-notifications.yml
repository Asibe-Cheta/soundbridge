name: Send Queued Push Notifications

# Backup only: Vercel cron GET /api/cron/send-event-push-queue every minute; POST /api/notifications/send-queued mirrors it (event + track queues).
# Credentials must match Vercel Production env: CRON_SECRET and/or SUPABASE_SERVICE_ROLE_KEY.
# This job uses GitHub Environment "Production" — update secrets there (Settings → Environments → Production),
# not only repository-level secrets.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Send queued notifications
        env:
          CRON_FROM_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_FROM_VAR: ${{ vars.CRON_SECRET }}
          SRK_FROM_SECRET: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SRK_FROM_VAR: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          CRON_SECRET="$(trim "${CRON_FROM_SECRET:-${CRON_FROM_VAR}}")"
          SUPABASE_SERVICE_ROLE_KEY="$(trim "${SRK_FROM_SECRET:-${SRK_FROM_VAR}}")"

          post_with_token() {
            local label="$1"
            local token="$2"
            if [ -z "${token}" ]; then
              return 2
            fi
            echo "Attempting auth with: ${label} (length ${#token})"
            HTTP_CODE=$(curl -sS -o /tmp/send-queued-body.txt -w "%{http_code}" -X POST \
              "https://www.soundbridge.live/api/notifications/send-queued" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${token}" \
              --connect-timeout 30 \
              --max-time 270)
            cat /tmp/send-queued-body.txt
            echo ""
            echo "HTTP ${HTTP_CODE}"
            [ "${HTTP_CODE}" = "200" ] || [ "${HTTP_CODE}" = "201" ]
          }

          if [ -z "${CRON_SECRET}" ] && [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Missing credentials: add CRON_SECRET and/or SUPABASE_SERVICE_ROLE_KEY to"
            echo "  • GitHub → Settings → Environments → Production → Secrets"
            echo "  • Vercel → Project → Settings → Environment Variables → Production"
            echo "Values must match between GitHub and Vercel."
            exit 1
          fi

          if post_with_token "CRON_SECRET" "${CRON_SECRET}"; then
            exit 0
          fi

          if [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ] && [ "${SUPABASE_SERVICE_ROLE_KEY}" != "${CRON_SECRET}" ]; then
            echo "CRON_SECRET rejected (401). Retrying with SUPABASE_SERVICE_ROLE_KEY..."
            if post_with_token "SUPABASE_SERVICE_ROLE_KEY" "${SUPABASE_SERVICE_ROLE_KEY}"; then
              exit 0
            fi
          fi

          echo "All auth attempts failed. Ensure GitHub Production secrets match Vercel Production env."
          exit 22

      - name: Log result
        if: always()
        run: echo "Notification job completed at $(date)"
